server:
  port: 8080
  tomcat:
    threads:
      max: 800 # 增加最大并发线程数
      min-spare: 100 # 核心保留线程
    max-connections: 10000 # 最大连接数

spring:
  profiles:
    include:
      - alipay
      - local
  datasource:
    url: jdbc:mysql://localhost:3306/air_ticket_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50 # 增加连接数，配合 Tomcat 线程
      minimum-idle: 10

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
      write-durations-as-timestamps: false

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s

mybatis:
  type-aliases-package: com.airticket.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.airticket: warn
    org.springframework.security: warn

jwt:
  secret: airTicketSystemSecretKey2024ForHMACAlgorithmWithAtLeast256Bits
  expiration: 86400000

service:
  fees:
    reschedule-base-fee: 200.00
    reschedule-percentage-fee: 0.10
    refund-base-fee: 300.00
    refund-percentage-fee: 0.15
    high-fee-threshold-hours: 24
    high-reschedule-base-fee: 400.00
    high-reschedule-percentage-fee: 0.20
    high-refund-base-fee: 500.00
    high-refund-percentage-fee: 0.25

app:
  logging:
    suppress-stdout: true
  upload:
    dir: uploads
  base:
    url: http://localhost:8080

chatbi:
  datasource:
    url: ${CHATBI_DATASOURCE_URL:${spring.datasource.url}}
    username: ${CHATBI_DATASOURCE_USERNAME:}
    password: ${CHATBI_DATASOURCE_PASSWORD:}
    driver-class-name: ${CHATBI_DATASOURCE_DRIVER_CLASS_NAME:${spring.datasource.driver-class-name}}
    maximum-pool-size: ${CHATBI_DATASOURCE_MAXIMUM_POOL_SIZE:5}
    minimum-idle: ${CHATBI_DATASOURCE_MINIMUM_IDLE:1}

llm:
  flight-assistant:
    base-url: ${LLM_BASE_URL:https://api.siliconflow.cn/v1}
    api-key: ${LLM_API_KEY:}
    model-name: ${LLM_MODEL:Qwen/Qwen2.5-72B-Instruct}
    temperature: 0.2
    max-messages: 8
    memory-ttl-seconds: 86400
